<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - SSBJr Dev Blog</title>
  <meta name="description" content="{{title}}">
  <meta name="author" content="Samuel SBJr">
  <meta property="og:title" content="{{title}}">
  <meta property="og:type" content="article">
  <meta name="theme-color" content="#000">
  <link rel="icon" href="/SSBJr.devblog/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/SSBJr.devblog/styles/main.css">
  <link rel="stylesheet" href="/SSBJr.devblog/styles/prism.css">
  <script src="/SSBJr.devblog/scripts/prism.js"></script>
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="container">
        <a href="/SSBJr.devblog/" class="logo">SSBJr Dev</a>
        <ul class="nav-links">
          <li><a href="/SSBJr.devblog/">Blog</a></li>
          <li><a href="/SSBJr.devblog/#projects">Projetos</a></li>
          <li><a href="/SSBJr.devblog/#products">Loja</a></li>
          <li><a href="/SSBJr.devblog/#podcasts">Podcast</a></li>
          <li><a href="/SSBJr.devblog/#videos">Vídeos</a></li>
          <li><a href="/SSBJr.devblog/about.html">Sobre</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container">
    <article class="post">
      <header class="post-header">
        <h1>{{title}}</h1>
        <div class="post-meta">
          <time datetime="{{date}}">{{date}}</time>
        </div>
        <div class="post-tags">
          {{tags}}
        </div>
      </header>

      <div class="post-content">
        {{content}}
      </div>

      <footer class="post-footer">
        <a href="/SSBJr.devblog/" class="back-link">← Voltar para o blog</a>
      </footer>
    </article>
  </main>

  <footer class="footer">
    <p>&copy; 2024 Samuel SBJr. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
